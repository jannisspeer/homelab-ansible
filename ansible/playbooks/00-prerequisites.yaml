---
- name: Prepare all nodes for Kubernetes
  hosts: multiverse
  become: true
  vars:
    ansible_python_interpreter: /usr/bin/python3
  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install required packages
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - software-properties-common
          - net-tools
        state: present

    - name: Download Miniconda installer
      ansible.builtin.get_url:
        url: "{{ miniconda_url }}"
        dest: /tmp/miniconda.sh
        mode: '0755'

    - name: Install Miniconda
      ansible.builtin.command: "bash /tmp/miniconda.sh -b -p {{ miniconda_prefix }}"
      args:
        creates: "{{ miniconda_prefix }}/bin/conda"

    - name: Accept conda Terms of Service
      ansible.builtin.command: "{{ miniconda_prefix }}/bin/conda tos accept"
      args:
        creates: "{{ miniconda_prefix }}/.tos_accepted"
      failed_when: false
      changed_when: false

    - name: Mark ToS as accepted
      ansible.builtin.file:
        path: "{{ miniconda_prefix }}/.tos_accepted"
        state: touch
        mode: '0644'

    - name: Create Ansible conda environment
      ansible.builtin.command: "{{ miniconda_prefix }}/bin/conda create -y -n {{ conda_env_name }} python={{ conda_python_version }}"
      args:
        creates: "{{ miniconda_prefix }}/envs/{{ conda_env_name }}"

    - name: Install Python tooling for Ansible and Kubernetes
      ansible.builtin.pip:
        executable: "{{ miniconda_prefix }}/envs/{{ conda_env_name }}/bin/pip"
        name:
          - pip
          - setuptools
          - wheel
          - kubernetes
          - openshift
          - pyyaml
          - requests
          - jsonpatch
          - netaddr
          - jmespath
          - urllib3
          - dnspython
          - kubernetes-validate
        state: present
        extra_args: --upgrade

    - name: Disable swap
      ansible.builtin.shell: |
        swapoff -a
        sed -i '/ swap / s/^\(.*\)$/#\1/g' /etc/fstab
      changed_when: true

    - name: Load kernel modules
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter

    - name: Ensure kernel modules load on boot
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter
        mode: '0644'

    - name: Set sysctl parameters
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        state: present
        reload: true
      loop:
        - { key: 'net.bridge.bridge-nf-call-iptables', value: '1' }
        - { key: 'net.bridge.bridge-nf-call-ip6tables', value: '1' }
        - { key: 'net.ipv4.ip_forward', value: '1' }

    - name: Install containerd
      ansible.builtin.apt:
        name: containerd
        state: present

    - name: Create CNI plugin directory
      ansible.builtin.file:
        path: /opt/cni/bin
        state: directory
        mode: '0755'

    - name: Download CNI plugins
      ansible.builtin.get_url:
        url: "{{ cni_plugins_url }}"
        dest: /tmp/cni-plugins.tgz
        mode: '0644'

    - name: Extract CNI plugins
      ansible.builtin.unarchive:
        src: /tmp/cni-plugins.tgz
        dest: /opt/cni/bin
        remote_src: true
        creates: /opt/cni/bin/loopback

    - name: Create containerd config directory
      ansible.builtin.file:
        path: /etc/containerd
        state: directory
        mode: '0755'

    - name: Check if containerd config exists
      ansible.builtin.stat:
        path: /etc/containerd/config.toml
      register: containerd_config_file

    - name: Generate default containerd config
      ansible.builtin.shell: containerd config default > /etc/containerd/config.toml
      when: not containerd_config_file.stat.exists
      changed_when: true

    - name: Enable SystemdCgroup in containerd config
      ansible.builtin.lineinfile:
        path: /etc/containerd/config.toml
        regexp: '^(\s*)SystemdCgroup = false'
        line: '\1SystemdCgroup = true'
        backrefs: true
      notify: Restart containerd

    - name: Ensure containerd is enabled and started
      ansible.builtin.systemd:
        name: containerd
        enabled: true
        state: started

    - name: Create apt keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download Kubernetes apt repository key
      ansible.builtin.get_url:
        url: https://pkgs.k8s.io/core:/stable:/v{{ k8s_major_minor }}/deb/Release.key
        dest: /etc/apt/keyrings/kubernetes-apt-keyring.asc
        mode: '0644'

    - name: Add Kubernetes apt repository
      ansible.builtin.deb822_repository:
        name: kubernetes
        types: [deb]
        uris: https://pkgs.k8s.io/core:/stable:/v{{ k8s_major_minor }}/deb/
        suites: [/]
        signed_by: /etc/apt/keyrings/kubernetes-apt-keyring.asc
        state: present

    - name: Install Kubernetes components
      ansible.builtin.apt:
        name:
          - kubelet={{ k8s_version }}
          - kubeadm={{ k8s_version }}
          - kubectl={{ k8s_version }}
          - etcd-client
        state: present
        update_cache: true

    - name: Hold Kubernetes packages at current version
      ansible.builtin.dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubelet
        - kubeadm
        - kubectl

    - name: Enable kubelet service
      ansible.builtin.systemd:
        name: kubelet
        enabled: true

  handlers:
    - name: Restart containerd
      ansible.builtin.systemd:
        name: containerd
        state: restarted
        daemon_reload: true
